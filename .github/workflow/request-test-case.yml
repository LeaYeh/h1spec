name: Generate Test Case

on:
  issues:
    types: [opened, labeled, edited]

jobs:
  generate-test-case:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'test-case')
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Extract issue information
      id: extract
      uses: actions/github-script@v6
      with:
        script: |
          const issue = await github.rest.issues.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });
          
          const formData = JSON.parse(issue.data.body);
          
          return {
            rfcDocument: formData['rfc-document'],
            rfcSection: formData['rfc-section'],
            rfcLink: formData['rfc-link'],
            testCaseName: formData['test-case-name'],
            testCaseDescription: formData['test-case-description'],
            mode: formData['mode'],
            sampleRequest: formData['sample-request'],
            expectedStatusCode: formData['expected-status-code'],
            expectedHeaders: formData['expected-headers'],
            expectedBody: formData['expected-body']
          };

    - name: Prepare prompt
      run: |
        echo 'PROMPT<<EOF' >> $GITHUB_ENV
        echo "You are an expert HTTP/1.1 test case developer. Your task is to create a new test case for the h1spec project based on the provided issue form and the existing project structure.

        Test Case Details:
        RFC Document: ${{ fromJson(steps.extract.outputs.result).rfcDocument }}
        RFC Section: ${{ fromJson(steps.extract.outputs.result).rfcSection }}
        RFC Link: ${{ fromJson(steps.extract.outputs.result).rfcLink }}
        Test Case Name: ${{ fromJson(steps.extract.outputs.result).testCaseName }}
        Test Case Description: ${{ fromJson(steps.extract.outputs.result).testCaseDescription }}
        Mode: ${{ fromJson(steps.extract.outputs.result).mode }}
        Sample Request:
        ${{ fromJson(steps.extract.outputs.result).sampleRequest }}
        Expected Status Code: ${{ fromJson(steps.extract.outputs.result).expectedStatusCode }}
        Expected Headers:
        ${{ fromJson(steps.extract.outputs.result).expectedHeaders }}
        Expected Body:
        ${{ fromJson(steps.extract.outputs.result).expectedBody }}

        Project Structure:
        $(tree spec)

        Relevant Source Code:
        $(cat spec/http1.1/*.go)

        Based on the provided information, please generate a Go test function that implements the described test case. The test function should:

        1. Follow the existing code style and conventions in the h1spec project.
        2. Be placed in the appropriate file within the spec/http1.1 directory, likely RFC7230.go or a new file if necessary.
        3. Use the existing utility functions and structures from the project where applicable.
        4. Implement the test case as described, including the sample request, expected status code, headers, and body.
        5. Include appropriate comments explaining the test case and its expected behavior.
        6. Use the provided Mode (MUST, SHOULD, MAY) to determine the severity of the test.

        Please provide the complete test function code, including any necessary imports or helper functions." >> $GITHUB_ENV
        echo 'EOF' >> $GITHUB_ENV

    - name: Generate test case
      id: generate
      uses: openai/openai-api@v1
      with:
        api-key: ${{ secrets.OPENAI_API_KEY }}
        prompt: ${{ env.PROMPT }}
        max-tokens: 1000
        temperature: 0.7

    - name: Create pull request
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Add new test case: ${{ fromJson(steps.extract.outputs.result).testCaseName }}"
        title: "New test case: ${{ fromJson(steps.extract.outputs.result).testCaseName }}"
        body: |
          This PR adds a new test case as requested in issue #${{ github.event.issue.number }}.

          Test Case Details:
          - RFC Document: ${{ fromJson(steps.extract.outputs.result).rfcDocument }}
          - RFC Section: ${{ fromJson(steps.extract.outputs.result).rfcSection }}
          - Test Case Name: ${{ fromJson(steps.extract.outputs.result).testCaseName }}
          - Mode: ${{ fromJson(steps.extract.outputs.result).mode }}

          Generated test case:
          ```go
          ${{ steps.generate.outputs.text }}
          ```

          Please review and adjust as necessary.
        branch: "test-case-${{ github.event.issue.number }}"
        base: main