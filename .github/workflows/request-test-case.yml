name: Generate Test Case
on:
  issues:
    types: [opened, labeled, edited]
jobs:
  generate-test-case:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'test-case')
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Extract issue information
      id: extract
      uses: actions/github-script@v6
      with:
        script: |
          const issue = await github.rest.issues.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });
          
          console.log('Issue body:', issue.data.body);
          
          function extractField(body, field) {
            const regex = new RegExp(`### ${field}\\s*([\\s\\S]*?)(?=###|$)`, 'i');
            const match = body.match(regex);
            return match ? match[1].trim() : '';
          }
          
          const formData = {
            'rfc-document': extractField(issue.data.body, 'RFC Document'),
            'rfc-section': extractField(issue.data.body, 'RFC Section'),
            'rfc-link': extractField(issue.data.body, 'RFC Link'),
            'test-case-name': extractField(issue.data.body, 'Test Case Name'),
            'test-case-description': extractField(issue.data.body, 'Test Case Description'),
            'mode': extractField(issue.data.body, 'Mode'),
            'sample-request': extractField(issue.data.body, 'Sample Request'),
            'expected-status-code': extractField(issue.data.body, 'Expected Status Code'),
            'expected-headers': extractField(issue.data.body, 'Expected Headers'),
            'expected-body': extractField(issue.data.body, 'Expected Body')
          };
          
          console.log('Extracted form data:', JSON.stringify(formData, null, 2));
          
          return formData;

    - name: Prepare prompt
      id: prepare_prompt
      run: |
        echo 'PROMPT<<EOF' >> $GITHUB_ENV
        echo "You are an expert HTTP/1.1 test case developer. Your task is to create a new test case for the h1spec project based on the provided issue form and the existing project structure.

        Test Case Details:
        RFC Document: ${{ fromJson(steps.extract.outputs.result)['rfc-document'] }}
        RFC Section: ${{ fromJson(steps.extract.outputs.result)['rfc-section'] }}
        RFC Link: ${{ fromJson(steps.extract.outputs.result)['rfc-link'] }}
        Test Case Name: ${{ fromJson(steps.extract.outputs.result)['test-case-name'] }}
        Test Case Description: ${{ fromJson(steps.extract.outputs.result)['test-case-description'] }}
        Mode: ${{ fromJson(steps.extract.outputs.result)['mode'] }}
        Sample Request:
        ${{ fromJson(steps.extract.outputs.result)['sample-request'] }}
        Expected Status Code: ${{ fromJson(steps.extract.outputs.result)['expected-status-code'] }}
        Expected Headers:
        ${{ fromJson(steps.extract.outputs.result)['expected-headers'] }}
        Expected Body:
        ${{ fromJson(steps.extract.outputs.result)['expected-body'] }}

        Project Structure:
        $(find spec -type d | sort | sed 's/^/  /')

        Relevant Source Code:
        $(find spec/http1.1 -name '*.go' -type f -exec echo '{}:' \; -exec cat {} \; -exec echo \;)

        Based on the provided information, please generate a Go test function that implements the described test case. The test function should adhere to the following guidelines:

        1. Follow the existing code style and conventions in the h1spec project.
        2. Be placed in the appropriate file within the spec/http1.1 directory, likely RFC7230.go or a new file if necessary.
        3. Use the existing utility functions and structures from the project where applicable.
        4. Implement the test case as described, including the sample request, expected status code, headers, and body.
        5. Include appropriate comments explaining the test case and its expected behavior.
        6. Use the provided Mode (MUST, SHOULD, MAY) to determine the severity of the test.

        Please adhere to the following specific requirements:
        - Name the test function using the format 'TestXXXX' where XXXX describes the specific test case.
        - Use the 'tg.AddTestCase(&spec.TestCase{...})' structure to add the test case.
        - Include all necessary import statements at the beginning of the file.
        - Provide a comment for each main step in the test function.
        - Use 'c *config.Config' and 'conn *spec.Conn' as parameters for the Run function.
        - Return a 'spec.TestError' for any test failures.
        - Ensure that the test case accurately reflects the provided Test Case Details, including the specific RFC requirements, expected status codes, headers, and body.

        Here's a basic structure to follow:

        ```go
        package http11

        import (
            'github.com/LeaYeh/h1spec/config'
            'github.com/LeaYeh/h1spec/spec'
        )

        func Http11YourTestGroup() *spec.TestGroup {
            tg := NewTestGroup('RFC7230.X.X', 'Your Test Group Name')
            
            tg.AddTestCase(&spec.TestCase{
                Strict:      true, // or false, based on the Mode
                Desc:        'Your test case description',
                Requirement: 'The specific requirement from the RFC',
                Run: func(c *config.Config, conn *spec.Conn) error {
                    // Your test implementation here
                    // ...
                    
                    return nil // or return &spec.TestError{...} if the test fails
                },
            })
            
            return tg
        }
        ```

        Please provide the complete test function code, including any necessary imports or helper functions. Ensure that the generated test case accurately implements the specific requirements and expectations detailed in the Test Case Details provided above." >> $GITHUB_ENV
        echo 'EOF' >> $GITHUB_ENV
        
        echo "Debug: Prompt content"
        cat $GITHUB_ENV

    - name: Generate test case
      id: generate
      uses: actions/github-script@v6
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      with:
        script: |
          const https = require('https');
          
          console.log('Debug: Prompt from environment variable');
          console.log(process.env.PROMPT);
          
          const data = JSON.stringify({
            model: "gpt-3.5-turbo",
            messages: [{"role": "user", "content": process.env.PROMPT}],
            max_tokens: 2000,
            temperature: 0.7
          });
          
          const options = {
            hostname: 'api.openai.com',
            port: 443,
            path: '/v1/chat/completions',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
              'Content-Length': data.length
            }
          };
          
          return new Promise((resolve, reject) => {
            const req = https.request(options, (res) => {
              let responseBody = '';
          
              res.on('data', (chunk) => {
                responseBody += chunk;
              });
          
              res.on('end', () => {
                console.log('Debug: OpenAI API response');
                console.log(responseBody);
                const response = JSON.parse(responseBody);
                resolve(response.choices[0].message.content);
              });
            });
          
            req.on('error', (error) => {
              console.error('Error:', error);
              reject(error);
            });
          
            req.write(data);
            req.end();
          });

    - name: Debug - Output generated code
      run: |
        echo "Generated Go code:"
        echo "----------------------------------------"
        echo "${{ steps.generate.outputs.result }}"
        echo "----------------------------------------"

    - name: Validate and format generated code
      id: validate
      uses: actions/setup-go@v2
      with:
        go-version: '1.16'
    - run: |
        # 移除可能的前導空白行和多餘的反引號
        GENERATED_CODE=$(echo "${{ steps.generate.outputs.result }}" | sed '/./,$!d' | sed 's/^```go//g' | sed 's/```$//g')
        echo "$GENERATED_CODE" > temp_test.go
        echo "Contents of temp_test.go:"
        cat temp_test.go
        # 嘗試格式化代碼
        go fmt temp_test.go
        # 嘗試編譯代碼
        if ! go build temp_test.go; then
          echo "Generated code failed to compile"
          exit 1
        fi

    - name: Create pull request
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Add new test case: ${{ fromJson(steps.extract.outputs.result)['test-case-name'] }}"
        title: "New test case: ${{ fromJson(steps.extract.outputs.result)['test-case-name'] }}"
        body: |
          This PR adds a new test case as requested in issue #${{ github.event.issue.number }}.
          Test Case Details:
          - RFC Document: ${{ fromJson(steps.extract.outputs.result)['rfc-document'] }}
          - RFC Section: ${{ fromJson(steps.extract.outputs.result)['rfc-section'] }}
          - Test Case Name: ${{ fromJson(steps.extract.outputs.result)['test-case-name'] }}
          - Mode: ${{ fromJson(steps.extract.outputs.result)['mode'] }}
          Generated test case:
          ```go
          ${{ steps.generate.outputs.result }}
          ```
          Please review and adjust as necessary.
        branch: "test-case-${{ github.event.issue.number }}"
        base: main